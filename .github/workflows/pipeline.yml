name: spunt-pipeline

on:
  # Auto-run twice a day at roughly 8am and 8pm Malta time.
  # GitHub cron is in UTC. Malta is UTC+2 in summer (CEST) and UTC+1 in
  # winter (CET), so the local time will drift by about an hour twice a
  # year — still morning and evening, just not exactly 08:00/20:00.
  #  06:00 UTC = 08:00 CEST / 07:00 CET
  #  18:00 UTC = 20:00 CEST / 19:00 CET
  # Also: scheduled runs can be delayed 5–15 min by GitHub under load.
  schedule:
    - cron: "0 6,18 * * *"
  # Manual runs from the GitHub UI (Actions → Run workflow) or from admin.html
  workflow_dispatch:
    inputs:
      stage:
        description: "Which stage to run"
        required: true
        default: "all"
        type: choice
        options: [collect, extract, analyse, verdict, ingest, all]

permissions:
  contents: write  # needed to commit updated CSVs back to the repo

concurrency:
  # Serialize runs so two scheduled workflows can't race on the CSV writes.
  group: spunt-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We need a real commit, not a detached HEAD, so we can push back.
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SPUNT_MODEL_BULK:      ${{ vars.SPUNT_MODEL_BULK      || 'claude-haiku-4-5-20251001' }}
          SPUNT_MODEL_REASONING: ${{ vars.SPUNT_MODEL_REASONING || 'claude-sonnet-4-6' }}
          SPUNT_MODEL_VERDICT:   ${{ vars.SPUNT_MODEL_VERDICT   || 'claude-sonnet-4-6' }}
        run: |
          # Scheduled runs (cron) only do the cheap ingestion stages.
          # Manual runs (workflow_dispatch) use whatever the user picked
          # in the dropdown, defaulting to 'ingest' if somehow nothing is
          # picked. The expensive 'verdict' stage has to be triggered
          # explicitly.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            STAGE="ingest"
          else
            STAGE="${{ github.event.inputs.stage }}"
            STAGE="${STAGE:-ingest}"
          fi
          echo "Running stage: $STAGE"
          python -m spunt "$STAGE" --root . -v

      - name: Commit updated data
        run: |
          git config user.name  "spunt-bot"
          git config user.email "spunt-bot@users.noreply.github.com"
          # Only commit the data dir; source/config changes come via PR.
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          STAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"
          git commit -m "data: pipeline run ${STAMP}"
          git push
