name: spunt-pipeline

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      stage:
        description: "Which stage to run"
        required: true
        default: "all"
        type: choice
        options: [collect, extract, analyse, verdict, all]

permissions:
  contents: write

concurrency:
  group: spunt-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SPUNT_MODEL_BULK:      ${{ vars.SPUNT_MODEL_BULK      || 'claude-haiku-4-5-20251001' }}
          SPUNT_MODEL_REASONING: ${{ vars.SPUNT_MODEL_REASONING || 'claude-sonnet-4-6' }}
          SPUNT_MODEL_VERDICT:   ${{ vars.SPUNT_MODEL_VERDICT   || 'claude-opus-4-6' }}
        run: |
          STAGE="${{ github.event.inputs.stage || 'all' }}"
          python -m spunt "$STAGE" --root . -v

      - name: Commit updated data
        run: |
          git config user.name  "spunt-bot"
          git config user.email "spunt-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          STAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"
          git commit -m "data: pipeline run ${STAMP}"
          git push
