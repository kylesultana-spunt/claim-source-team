name: Claim Collector

on:
  schedule:
    # 7:00 AM Malta time (UTC+2 in summer) = 5:00 AM UTC
    - cron: '0 5 * * *'
    # 7:00 PM Malta time = 5:00 PM UTC
    - cron: '0 17 * * *'
  # Also allow manual trigger from GitHub website
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Claim Collector
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAIMS_DATA_DIR: ${{ github.workspace }}/data
        run: python collector.py

      - name: Commit updated CSVs
        run: |
          git config --global user.name "Claim Collector Bot"
          git config --global user.email "bot@claim-source-team"
          git add data/
          git diff --staged --quiet || git commit -m "Auto: update claims $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
