<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>spunt.mt — admin</title>
  <style>
    :root {
      --bg: #0f1216;
      --panel: #171b22;
      --panel-2: #1f242d;
      --border: #2a313c;
      --text: #e7ebf2;
      --muted: #8e96a4;
      --accent: #ffce3e;       /* spunt yellow-ish */
      --accent-fg: #111;
      --ok: #4ade80;
      --warn: #fbbf24;
      --bad: #f87171;
      --info: #60a5fa;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: var(--info); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { font: inherit; cursor: pointer; }
    input, select, textarea {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; font: inherit; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 6px;
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn:hover { background: #252a35; }
    .btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 600; }
    .btn.primary:hover { filter: brightness(0.95); }
    .btn.danger { color: var(--bad); border-color: #3a2326; }
    .btn.danger:hover { background: #2a1c1f; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Inline per-row triage buttons in the Claims tab. Smaller and tighter
       than main-chrome buttons so three fit on one row without wrapping. */
    .btn.triage { padding: 4px 9px; font-size: 12px; margin-left: 4px; }
    .btn.triage.tri-fact     { color: var(--ok);   border-color: #1f3b2b; }
    .btn.triage.tri-fact:hover     { background: #122018; }
    .btn.triage.tri-rhetoric { color: var(--warn); border-color: #3b2f14; }
    .btn.triage.tri-rhetoric:hover { background: #231c0d; }
    .btn.triage.tri-reject   { color: var(--bad);  border-color: #3a2326; }
    .btn.triage.tri-reject:hover   { background: #241517; }

    /* Login gate */
    .gate {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .gate form {
      background: var(--panel); padding: 32px; border-radius: 10px;
      border: 1px solid var(--border); width: 320px;
    }
    .gate h1 { margin: 0 0 20px; font-size: 18px; }
    .gate input { width: 100%; margin-bottom: 12px; }
    .gate .msg { color: var(--bad); font-size: 13px; min-height: 18px; margin-bottom: 8px; }

    /* Main layout */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header .brand { font-weight: 700; letter-spacing: 0.02em; }
    header .brand .dot { color: var(--accent); }
    header .right { display: flex; align-items: center; gap: 10px; }
    header .meta { color: var(--muted); font-size: 13px; }

    .stats { display: flex; gap: 10px; padding: 14px 20px 0; flex-wrap: wrap; }
    .stat {
      flex: 1 1 160px; min-width: 140px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
    }
    .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .stat.accent .value { color: var(--accent); }

    .tabs { display: flex; gap: 2px; padding: 18px 20px 0; border-bottom: 1px solid var(--border); }
    .tab { padding: 10px 14px; color: var(--muted); border: none; background: none;
      border-bottom: 2px solid transparent; border-radius: 0; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }

    .toolbar { display: flex; gap: 10px; align-items: center; padding: 14px 20px; flex-wrap: wrap; }
    .toolbar input[type=search] { flex: 1 1 240px; min-width: 200px; }

    main { padding: 0 20px 40px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; color: var(--muted); font-weight: 500;
      padding: 10px 8px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg);
    }
    thead th.sortable { cursor: pointer; user-select: none; }
    thead th.sortable:hover { color: var(--text); }
    thead th.sorted { color: var(--accent); }
    thead th.sortable::after {
      content: ""; display: inline-block; width: 0.8em; margin-left: 4px;
      color: var(--muted); opacity: 0.5;
    }
    thead th.sorted.asc::after  { content: "▲"; opacity: 1; color: var(--accent); }
    thead th.sorted.desc::after { content: "▼"; opacity: 1; color: var(--accent); }
    tbody td { padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: var(--panel); }

    .badge {
      display: inline-block; font-size: 11px; padding: 2px 7px;
      border-radius: 999px; border: 1px solid var(--border); color: var(--muted);
      white-space: nowrap;
    }
    .badge.ok { color: var(--ok); border-color: #1f3b2b; background: #122018; }
    .badge.warn { color: var(--warn); border-color: #3b2f14; background: #231c0d; }
    .badge.bad { color: var(--bad); border-color: #3a2326; background: #241517; }
    .badge.info { color: var(--info); border-color: #1c2a44; background: #111a2a; }
    .score { font-variant-numeric: tabular-nums; }

    /* Side panel */
    .panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(520px, 100%);
      background: var(--panel); border-left: 1px solid var(--border);
      transform: translateX(100%); transition: transform 0.2s ease;
      display: flex; flex-direction: column; z-index: 20;
      box-shadow: -10px 0 40px rgba(0,0,0,0.5);
    }
    .panel.open { transform: translateX(0); }
    .panel header { background: var(--panel); border-bottom: 1px solid var(--border); }
    .panel .body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .panel .row { margin-bottom: 12px; }
    .panel .row .k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .panel .row .v { margin-top: 2px; word-break: break-word; }
    .panel .actions { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }

    /* Modal (add claim) */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 30;
      display: none; align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; width: min(560px, 92vw); max-height: 90vh;
      display: flex; flex-direction: column;
    }
    .modal header { background: var(--panel); border-bottom: 1px solid var(--border); }
    .modal .body { padding: 16px 20px; overflow-y: auto; }
    .modal .body label { display: block; margin: 10px 0 4px; font-size: 12px; color: var(--muted); }
    .modal .body input, .modal .body select, .modal .body textarea { width: 100%; }
    .modal .actions { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--panel-2); border: 1px solid var(--border);
      padding: 10px 16px; border-radius: 8px; z-index: 60;
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    .toast.show { opacity: 1; }
    .toast.err { border-color: #3a2326; color: var(--bad); }
    .toast.ok { border-color: #1f3b2b; color: var(--ok); }

    .muted { color: var(--muted); }
    .empty { padding: 40px; text-align: center; color: var(--muted); }

    @media (max-width: 600px) {
      .panel { width: 100%; }
      header { flex-direction: column; gap: 10px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- Login gate -->
<div class="gate" id="gate">
  <form id="gateForm">
    <h1>spunt.mt admin</h1>
    <input type="password" id="gatePw" placeholder="Password" autocomplete="current-password" autofocus />
    <div class="msg" id="gateMsg"></div>
    <button class="btn primary" type="submit" style="width:100%">Sign in</button>
  </form>
</div>

<header id="chrome" style="display:none">
  <div class="brand">spunt<span class="dot">.</span>mt <span class="muted" style="font-weight:400">· admin</span></div>
  <div class="right">
    <span class="meta" id="lastRun">—</span>
    <button class="btn" id="btnRefresh" title="Reload data from CSV">↻ Reload</button>
    <button class="btn" id="btnAdd">+ Add claim</button>
    <button class="btn primary" id="btnIngest" title="Pull new articles, extract claims, sort them — no verdicts, cheap and fast">▶ Fetch new claims</button>
    <button class="btn" id="btnVerdict" title="Generate automated verdicts for approved claims — slow and uses API credits">🔍 Run verdicts</button>
    <button class="btn" id="btnLogout" title="Sign out">↪</button>
  </div>
</header>

<section class="stats" id="stats" style="display:none"></section>

<nav class="tabs" id="tabs" style="display:none"></nav>

<div class="toolbar" id="toolbar" style="display:none">
  <input type="search" id="search" placeholder="Search claim, speaker, source…" />
  <select id="filterParty">
    <option value="">All parties</option>
    <option>PL</option><option>PN</option><option>ADPD</option><option>VOLT</option><option>unknown</option>
  </select>
  <select id="filterSource">
    <option value="">All sources</option>
  </select>
</div>

<main id="main" style="display:none">
  <div id="list"></div>
</main>

<!-- Claim detail side panel -->
<aside class="panel" id="sidePanel">
  <header>
    <div class="brand">Claim details</div>
    <div class="right"><button class="btn" id="btnCloseSide">✕</button></div>
  </header>
  <div class="body" id="sideBody"></div>
  <div class="actions" id="sideActions"></div>
</aside>

<!-- Add claim modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <header>
      <div class="brand">Add claim manually</div>
      <div class="right"><button class="btn" id="btnCloseModal">✕</button></div>
    </header>
    <div class="body">
      <label>Destination queue</label>
      <select id="f_queue">
        <option value="fact_check_queue">Fact-check queue (approved_for_check)</option>
        <option value="review_queue">Review queue (queued_for_review)</option>
        <option value="rhetoric_archive">Rhetoric archive (archived_rhetoric)</option>
      </select>

      <label>Atomic claim *</label>
      <textarea id="f_atomic" rows="3" placeholder="Self-contained claim sentence"></textarea>

      <label>Original claim_text</label>
      <textarea id="f_claim_text" rows="2" placeholder="As quoted/reported"></textarea>

      <label>Speaker</label>
      <input id="f_speaker" placeholder="e.g. Robert Abela" />

      <label>Role</label>
      <input id="f_role" placeholder="e.g. Prime Minister" />

      <label>Party</label>
      <select id="f_party">
        <option>PL</option><option>PN</option><option>ADPD</option><option>VOLT</option><option value="unknown" selected>unknown</option>
      </select>

      <label>Source name</label>
      <input id="f_source_name" placeholder="e.g. MaltaToday" />

      <label>Source URL</label>
      <input id="f_source_url" type="url" placeholder="https://…" />

      <label>Publication date</label>
      <input id="f_publication_date" type="date" />

      <label>Claim type</label>
      <select id="f_claim_type">
        <option>statistical</option><option>comparative</option><option>policy</option>
        <option>legal</option><option>administrative</option><option>historical</option>
        <option>rhetorical</option><option>opinion</option>
      </select>

      <label>Fact-checkability score (1–5)</label>
      <input id="f_score" type="number" min="1" max="5" value="4" />

      <label>Evidence target</label>
      <input id="f_evidence_target" placeholder="e.g. NSO statistics" />
    </div>
    <div class="actions">
      <button class="btn" id="btnCancelAdd">Cancel</button>
      <button class="btn primary" id="btnSubmitAdd">Save claim</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ------------------------------------------------------------------- config
const QUEUES = [
  // "Claims" is the triage tab: every newly extracted claim lands here
  // and the editor decides (per row) whether to fact-check it, archive it
  // as rhetoric, or reject it outright. This is the default view.
  { id: "pending_claims",   label: "Claims",        file: "/data/pending_claims.csv",   kind: "pending" },
  { id: "inbox",            label: "Inbox",         file: "/data/inbox.csv",            kind: "inbox" },
  { id: "fact_check_queue", label: "Fact check",    file: "/data/fact_check_queue.csv", kind: "queue" },
  { id: "review_queue",     label: "Review",        file: "/data/review_queue.csv",     kind: "queue" },
  { id: "rhetoric_archive", label: "Rhetoric",      file: "/data/rhetoric_archive.csv", kind: "queue" },
  { id: "verdicts",         label: "Verdicts",      file: "/data/verdicts.csv",         kind: "verdict" },
];

const PW_KEY = "spunt_admin_pw";
// Default sort: newest-added first. That way when you open any tab, the most
// recently-collected claims are at the top, and you can instantly see
// whether the last pipeline run added anything new.
const DEFAULT_SORT = {
  pending: { key: "fetched_at",  dir: "desc" },
  inbox:   { key: "fetched_at",  dir: "desc" },
  queue:   { key: "fetched_at",  dir: "desc" },
  verdict: { key: "checked_at",  dir: "desc" },
};
// Which columns are numeric (parse before compare). Everything else is a
// string compare, which also works for ISO-ish dates like "2026-04-06" and
// "2026-04-20 14:02 UTC".
const NUMERIC_KEYS = new Set(["fact_checkability_score", "confidence"]);

// "pending_claims" is the default tab — that's where the editor triages
// newly-extracted claims into fact-check / rhetoric / reject.
let state = { data: {}, active: "pending_claims", selected: null, sort: null };

// ------------------------------------------------------------------- helpers
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

function toast(msg, kind) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast show " + (kind || "");
  setTimeout(() => { t.className = "toast " + (kind || ""); }, 2500);
}

function authHeaders() {
  return { "X-Admin-Password": localStorage.getItem(PW_KEY) || "" };
}

async function api(path, options) {
  const r = await fetch(path, Object.assign({
    headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
  }, options || {}));
  const text = await r.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
  if (!r.ok) throw new Error((data && data.error) || r.statusText);
  return data;
}

// RFC-4180 CSV parser
function parseCSV(text) {
  const rows = [];
  let i = 0, field = "", row = [], inQ = false;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i += 2; continue; }
        inQ = false; i++; continue;
      }
      field += c; i++;
    } else {
      if (c === '"') { inQ = true; i++; continue; }
      if (c === ",") { row.push(field); field = ""; i++; continue; }
      if (c === "\r") { i++; continue; }
      if (c === "\n") { row.push(field); rows.push(row); field = ""; row = []; i++; continue; }
      field += c; i++;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  if (!rows.length) return [];
  const headers = rows[0];
  return rows.slice(1)
    .filter(r => r.some(x => x !== ""))
    .map(r => Object.fromEntries(headers.map((h, j) => [h, r[j] ?? ""])));
}

function esc(s) { return String(s ?? "").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// ----- sorting ----------------------------------------------------------
function sortRows(rows, sort) {
  if (!sort || !sort.key) return rows;
  const { key, dir } = sort;
  const isNum = NUMERIC_KEYS.has(key);
  const mult = dir === "asc" ? 1 : -1;
  return [...rows].sort((a, b) => {
    let av = a[key] ?? "", bv = b[key] ?? "";
    if (isNum) {
      av = parseFloat(av) || 0;
      bv = parseFloat(bv) || 0;
      return (av - bv) * mult;
    }
    // String / date compare. Empty strings sink to the bottom regardless
    // of direction so "unknown" dates don't dominate the top of the list.
    if (av === "" && bv !== "") return 1;
    if (bv === "" && av !== "") return -1;
    return String(av).localeCompare(String(bv)) * mult;
  });
}

function onHeaderClick(key) {
  const cur = state.sort || {};
  if (cur.key === key) {
    // same column: cycle asc → desc → off
    if (cur.dir === "asc")  state.sort = { key, dir: "desc" };
    else if (cur.dir === "desc") state.sort = null;
    else                     state.sort = { key, dir: "asc" };
  } else {
    // new column: date-ish columns default to desc (newest first),
    // everything else ascending.
    const dir = /(_at|_date)$/.test(key) ? "desc" : "asc";
    state.sort = { key, dir };
  }
  render();
}

function headerCell(label, key) {
  const s = state.sort;
  const cls = ["sortable"];
  if (s && s.key === key) cls.push("sorted", s.dir);
  return `<th class="${cls.join(" ")}" data-sort="${esc(key)}">${esc(label)}</th>`;
}

function wireHeaders(el) {
  el.querySelectorAll("thead th.sortable").forEach(th => {
    th.addEventListener("click", () => onHeaderClick(th.dataset.sort));
  });
}

function badgeForStatus(s) {
  if (s === "approved_for_check") return '<span class="badge ok">approved</span>';
  if (s === "queued_for_review") return '<span class="badge warn">review</span>';
  if (s === "archived_rhetoric") return '<span class="badge bad">rhetoric</span>';
  return `<span class="badge">${esc(s)}</span>`;
}
function badgeForVerdict(v) {
  if (v === "true")          return '<span class="badge ok">true</span>';
  if (v === "mostly_true")   return '<span class="badge ok">mostly true</span>';
  if (v === "mixed")         return '<span class="badge warn">mixed</span>';
  if (v === "mostly_false")  return '<span class="badge bad">mostly false</span>';
  if (v === "false")         return '<span class="badge bad">false</span>';
  return '<span class="badge info">unverifiable</span>';
}

// ---------------------------------------------------------------- gate
$("#gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw = $("#gatePw").value.trim();
  if (!pw) return;
  localStorage.setItem(PW_KEY, pw);
  try {
    await api("/api/auth", { method: "POST" });
    showApp();
  } catch (err) {
    localStorage.removeItem(PW_KEY);
    $("#gateMsg").textContent = "Wrong password.";
  }
});

$("#btnLogout").addEventListener("click", () => {
  localStorage.removeItem(PW_KEY);
  location.reload();
});

// Try auto-login on load
(async function tryAuto() {
  if (!localStorage.getItem(PW_KEY)) return;
  try { await api("/api/auth", { method: "POST" }); showApp(); }
  catch { localStorage.removeItem(PW_KEY); }
})();

function showApp() {
  $("#gate").style.display = "none";
  $("#chrome").style.display = "";
  $("#stats").style.display = "";
  $("#tabs").style.display = "";
  $("#toolbar").style.display = "";
  $("#main").style.display = "";
  loadAll();
}

// ---------------------------------------------------------------- data load
async function loadAll() {
  const results = await Promise.all(QUEUES.map(async (q) => {
    try {
      const r = await fetch(q.file + "?_=" + Date.now());
      if (!r.ok) return [];
      return parseCSV(await r.text());
    } catch { return []; }
  }));
  QUEUES.forEach((q, i) => state.data[q.id] = results[i]);
  renderStats(); renderTabs(); renderSourceFilter(); render();
  try {
    const runs = await api("/api/runs");
    if (runs && runs.latest) {
      const d = new Date(runs.latest.created_at);
      $("#lastRun").textContent = `Last run: ${d.toLocaleString()} · ${runs.latest.status}`;
    }
  } catch {}
}

// ---------------------------------------------------------------- render
function renderStats() {
  const s = $("#stats");
  s.innerHTML = QUEUES.map(q => {
    const n = state.data[q.id]?.length || 0;
    const cls = q.id === "fact_check_queue" ? "accent" : "";
    return `<div class="stat ${cls}"><div class="label">${q.label}</div><div class="value">${n}</div></div>`;
  }).join("");
}

function renderTabs() {
  $("#tabs").innerHTML = QUEUES.map(q =>
    `<button class="tab ${q.id === state.active ? "active" : ""}" data-id="${q.id}">${q.label}</button>`
  ).join("");
  $$("#tabs .tab").forEach(t => t.addEventListener("click", () => {
    state.active = t.dataset.id;
    // Reset to the default sort for this tab type (newest-added first).
    const kind = QUEUES.find(q => q.id === state.active).kind;
    state.sort = { ...(DEFAULT_SORT[kind] || null) };
    renderTabs(); render();
  }));
}

function renderSourceFilter() {
  const all = new Set();
  Object.values(state.data).forEach(rows => rows.forEach(r => {
    if (r.source_name) all.add(r.source_name);
  }));
  const cur = $("#filterSource").value;
  $("#filterSource").innerHTML =
    '<option value="">All sources</option>' +
    [...all].sort().map(s => `<option ${s === cur ? "selected" : ""}>${esc(s)}</option>`).join("");
}

function render() {
  const q = QUEUES.find(q => q.id === state.active);
  const rows = state.data[q.id] || [];
  const search = $("#search").value.toLowerCase().trim();
  const fp = $("#filterParty").value;
  const fs = $("#filterSource").value;

  // Set a default sort for this tab if none is active yet.
  if (!state.sort || !state.sort.key) {
    state.sort = { ...(DEFAULT_SORT[q.kind] || null) };
  }

  const filtered = rows.filter(r => {
    if (fp && (r.party || "") !== fp) return false;
    if (fs && (r.source_name || "") !== fs) return false;
    if (!search) return true;
    const hay = [r.atomic_claim, r.claim_text, r.raw_statement, r.speaker, r.source_name]
      .filter(Boolean).join(" ").toLowerCase();
    return hay.includes(search);
  });

  const sorted = sortRows(filtered, state.sort);

  const listEl = $("#list");
  if (!sorted.length) { listEl.innerHTML = `<div class="empty">No rows match your filters.</div>`; return; }

  if (q.kind === "verdict") return renderVerdicts(listEl, sorted);
  if (q.kind === "inbox")   return renderInbox(listEl, sorted);
  if (q.kind === "pending") return renderPending(listEl, sorted);
  return renderQueue(listEl, sorted);
}

// The triage view. One row per pending claim, with three action buttons
// inline on the right. Clicking a button calls /api/triage which moves the
// row into the relevant destination CSV (fact_check / rhetoric / dropped)
// and removes it from pending_claims.csv.
function renderPending(el, rows) {
  el.innerHTML = `
    <table>
      <thead><tr>
        ${headerCell("Claim", "atomic_claim")}
        ${headerCell("Speaker", "speaker")}
        ${headerCell("Source", "source_name")}
        ${headerCell("Claim date", "publication_date")}
        ${headerCell("Added", "fetched_at")}
        <th style="width:260px; text-align:right">Decide</th>
      </tr></thead>
      <tbody>
        ${rows.map((r, i) => `
          <tr data-i="${i}">
            <td>${esc((r.atomic_claim || r.claim_text || "").slice(0, 180))}</td>
            <td>${esc(r.speaker || "")} <span class="muted">${esc(r.party || "")}</span></td>
            <td>${r.source_url ? `<a href="${esc(r.source_url)}" target="_blank" rel="noopener">${esc(r.source_name || "link")}</a>` : esc(r.source_name || "")}</td>
            <td class="muted" style="white-space:nowrap">${esc(r.publication_date || "—")}</td>
            <td class="muted" style="white-space:nowrap">${esc(r.fetched_at || "—")}</td>
            <td style="text-align:right; white-space:nowrap">
              <button class="btn triage tri-fact"     data-i="${i}" data-decision="fact_check" title="Approve this for automated fact-checking">✓ Fact-check</button>
              <button class="btn triage tri-rhetoric" data-i="${i}" data-decision="rhetoric"   title="Keep as rhetoric (no verdict)">⊘ Rhetoric</button>
              <button class="btn triage tri-reject"   data-i="${i}" data-decision="reject"     title="Discard — bad extraction or off-topic">✗ Reject</button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>`;
  wireHeaders(el);
  // Row body click -> side panel (read-only detail view).
  el.querySelectorAll("tbody tr").forEach(tr => {
    tr.addEventListener("click", (ev) => {
      if (ev.target.closest("button.triage") || ev.target.closest("a")) return;
      openSide(rows[tr.dataset.i]);
    });
  });
  // Triage buttons.
  el.querySelectorAll("button.triage").forEach(b => {
    b.addEventListener("click", (ev) => {
      ev.stopPropagation();
      const row = rows[Number(b.dataset.i)];
      triageClaim(row, b.dataset.decision, b);
    });
  });
}

async function triageClaim(row, decision, btnEl) {
  const label = {
    fact_check: "send to fact-check queue",
    rhetoric:   "archive as rhetoric",
    reject:     "reject and discard",
  }[decision];
  if (!row || !row.atomic_claim) return;
  if (!confirm(`${label[0].toUpperCase()+label.slice(1)}?\n\n"${(row.atomic_claim || "").slice(0, 220)}"`)) return;

  // Disable all triage buttons on this row while the request is in flight.
  const rowButtons = btnEl.closest("tr")?.querySelectorAll("button.triage") || [btnEl];
  rowButtons.forEach(b => b.disabled = true);
  try {
    await api("/api/triage", {
      method: "POST",
      body: JSON.stringify({
        atomic_claim: row.atomic_claim,
        source_url:   row.source_url || "",
        decision,
      }),
    });
    toast({
      fact_check: "Sent to fact-check queue.",
      rhetoric:   "Archived as rhetoric.",
      reject:     "Claim discarded.",
    }[decision], "ok");
    await loadAll();
  } catch (e) {
    rowButtons.forEach(b => b.disabled = false);
    toast("Triage failed: " + e.message, "err");
  }
}

["#search", "#filterParty", "#filterSource"].forEach(s => $(s).addEventListener("input", render));

// ---------------------------------------------------------------- side panel
function openSide(row) {
  state.selected = row;
  const q = QUEUES.find(q => q.id === state.active);
  const body = $("#sideBody");
  const fields = Object.keys(row);
  body.innerHTML = fields.map(k => {
    let v = row[k];
    if (k === "source_url" && v) v = `<a href="${esc(v)}" target="_blank" rel="noopener">${esc(v)}</a>`;
    else if (k === "evidence" && v) {
      try {
        const parsed = JSON.parse(v);
        v = parsed.map(e => `<div style="margin:4px 0"><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.title)}</a><br><span class="muted">${esc(e.quote)}</span></div>`).join("");
      } catch { v = esc(v); }
    } else v = esc(v);
    return `<div class="row"><div class="k">${esc(k)}</div><div class="v">${v}</div></div>`;
  }).join("");

  const actions = $("#sideActions");
  let btns = "";
  if (q.id === "fact_check_queue") {
    btns += `<button class="btn danger" id="btnBlock">🚫 Block (move to rhetoric)</button>`;
  }
  actions.innerHTML = btns;
  if (q.id === "fact_check_queue") {
    $("#btnBlock").addEventListener("click", blockSelected);
  }

  $("#sidePanel").classList.add("open");
}
$("#btnCloseSide").addEventListener("click", () => $("#sidePanel").classList.remove("open"));

// ---------------------------------------------------------------- block action
async function blockSelected() {
  const row = state.selected;
  if (!row) return;
  if (!confirm(`Block this claim from being fact-checked?\n\n"${(row.atomic_claim || "").slice(0, 200)}"`)) return;
  try {
    await api("/api/block", {
      method: "POST",
      body: JSON.stringify({ atomic_claim: row.atomic_claim, source_url: row.source_url })
    });
    toast("Claim blocked — moved to rhetoric archive.", "ok");
    $("#sidePanel").classList.remove("open");
    await loadAll();
  } catch (e) {
    toast("Block failed: " + e.message, "err");
  }
}

// ---------------------------------------------------------------- add claim
$("#btnAdd").addEventListener("click", () => $("#modalBg").classList.add("open"));
$("#btnCloseModal").addEventListener("click", () => $("#modalBg").classList.remove("open"));
$("#btnCancelAdd").addEventListener("click", () => $("#modalBg").classList.remove("open"));

$("#btnSubmitAdd").addEventListener("click", async () => {
  const queue = $("#f_queue").value;
  const atomic = $("#f_atomic").value.trim();
  if (!atomic) { toast("Atomic claim is required", "err"); return; }

  const row = {
    claim_text: $("#f_claim_text").value.trim() || atomic,
    atomic_claim: atomic,
    speaker: $("#f_speaker").value.trim() || "unknown",
    role: $("#f_role").value.trim() || "",
    party: $("#f_party").value.trim() || "unknown",
    source_name: $("#f_source_name").value.trim() || "manual",
    source_url: $("#f_source_url").value.trim() || "",
    publication_date: $("#f_publication_date").value || "unknown",
    claim_type: $("#f_claim_type").value,
    verifiability_status: queue === "fact_check_queue" ? "checkable" :
                          queue === "review_queue" ? "partially_checkable" : "not_checkable",
    fact_checkability_score: parseInt($("#f_score").value, 10) || 1,
    evidence_target: $("#f_evidence_target").value.trim() || "",
    numeric_flag: /[€$]|\d+(?:\.\d+)?\s*%|\b\d{3,}\b/.test(atomic) ? "TRUE" : "FALSE",
    legal_flag:   /\b(law|legal notice|bill|regulation|act|constitution)\b/i.test(atomic) ? "TRUE" : "FALSE",
    comparison_flag: /\b(more than|less than|vs|compared|versus|double|triple|half)\b/i.test(atomic) ? "TRUE" : "FALSE",
    timeframe_present: /\b(19|20)\d{2}\b|\b\d+\s*(year|month|week|day)s?\b/i.test(atomic) ? "TRUE" : "FALSE",
    needs_human_review: queue === "review_queue" ? "TRUE" : "FALSE",
    rejection_reason: queue === "rhetoric_archive" ? "editor_added" : "",
    status: queue === "fact_check_queue" ? "approved_for_check" :
            queue === "review_queue"     ? "queued_for_review"  :
                                           "archived_rhetoric",
  };

  try {
    await api("/api/claim", { method: "POST", body: JSON.stringify({ queue, row }) });
    toast("Claim added.", "ok");
    $("#modalBg").classList.remove("open");
    ["f_atomic","f_claim_text","f_speaker","f_role","f_source_name","f_source_url","f_publication_date","f_evidence_target"].forEach(id => $("#"+id).value = "");
    await loadAll();
  } catch (e) {
    toast("Add failed: " + e.message, "err");
  }
});

// ---------------------------------------------------------------- run pipeline
// Two separate triggers:
//   • Fetch new claims → runs the cheap "ingest" stages (collect + extract + analyse)
//   • Run verdicts     → runs only the expensive "verdict" stage
// Scheduled auto-runs at 8am/8pm Malta time also do "ingest".
async function triggerStage(stage, btnId, confirmMsg, okMsg) {
  if (!confirm(confirmMsg)) return;
  const btn = $("#" + btnId);
  btn.disabled = true;
  try {
    await api("/api/trigger", { method: "POST", body: JSON.stringify({ stage }) });
    toast(okMsg, "ok");
  } catch (e) {
    toast("Trigger failed: " + e.message, "err");
  } finally {
    setTimeout(() => { btn.disabled = false; }, 5000);
  }
}

$("#btnIngest").addEventListener("click", () => triggerStage(
  "ingest",
  "btnIngest",
  "Fetch new claims now? This pulls news, extracts claims, and sorts them. No verdicts. Cheap and fast.",
  "Ingest triggered — new claims will appear in ~2–5 min."
));

$("#btnVerdict").addEventListener("click", () => triggerStage(
  "verdict",
  "btnVerdict",
  "Run automated verdicts now? This is slow (~5 min) and uses API credits. Proceed?",
  "Verdicts triggered — results will appear in ~5–15 min."
));

$("#btnRefresh").addEventListener("click", loadAll);
</script>
